<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#1A4332"/>
  <!-- Outer lotus petals (gold) -->
  <ellipse cx="50" cy="50" rx="11" ry="26" fill="#D4AF37" opacity="0.95" transform="rotate(0 50 50)"/>
  <ellipse cx="50" cy="50" rx="11" ry="26" fill="#D4AF37" opacity="0.85" transform="rotate(60 50 50)"/>
  <ellipse cx="50" cy="50" rx="11" ry="26" fill="#D4AF37" opacity="0.85" transform="rotate(120 50 50)"/>
  <!-- Inner lotus petals (warm orange-gold) -->
  <ellipse cx="50" cy="50" rx="8" ry="19" fill="#C9A227" opacity="0.7" transform="rotate(30 50 50)"/>
  <ellipse cx="50" cy="50" rx="8" ry="19" fill="#C9A227" opacity="0.7" transform="rotate(90 50 50)"/>
  <ellipse cx="50" cy="50" rx="8" ry="19" fill="#C9A227" opacity="0.7" transform="rotate(150 50 50)"/>
  <!-- Center -->
  <circle cx="50" cy="50" r="10" fill="#D4AF37"/>
  <circle cx="50" cy="50" r="6"  fill="#F5DFA0"/>
</svg>
