<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1A4332"/>

  <!-- Radial glow center -->
  <radialGradient id="glow" cx="50%" cy="50%" r="60%">
    <stop offset="0%"   stop-color="#2D6A4F" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#1A4332" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Outer border -->
  <rect x="24" y="24" width="1152" height="582" rx="12" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.35"/>
  <!-- Inner border -->
  <rect x="36" y="36" width="1128" height="558" rx="8"  fill="none" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.18"/>

  <!-- Corner ornament TL -->
  <path d="M60,60 Q110,60 110,110" stroke="#D4AF37" stroke-width="1.2" fill="none" opacity="0.55"/>
  <path d="M60,60 Q60,110 110,110" stroke="#D4AF37" stroke-width="1.2" fill="none" opacity="0.55"/>
  <line x1="60" y1="60" x2="88" y2="60" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="60" y1="60" x2="60" y2="88" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Corner ornament TR -->
  <path d="M1140,60 Q1090,60 1090,110" stroke="#D4AF37" stroke-width="1.2" fill="none" opacity="0.55"/>
  <path d="M1140,60 Q1140,110 1090,110" stroke="#D4AF37" stroke-width="1.2" fill="none" opacity="0.55"/>
  <line x1="1140" y1="60" x2="1112" y2="60" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="1140" y1="60" x2="1140" y2="88" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Corner ornament BL -->
  <path d="M60,570 Q110,570 110,520" stroke="#D4AF37" stroke-width="1.2" fill="none" opacity="0.55"/>
  <path d="M60,570 Q60,520 110,520" stroke="#D4AF37" stroke-width="1.2" fill="none" opacity="0.55"/>
  <line x1="60" y1="570" x2="88"  y2="570" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="60" y1="570" x2="60"  y2="542" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Corner ornament BR -->
  <path d="M1140,570 Q1090,570 1090,520" stroke="#D4AF37" stroke-width="1.2" fill="none" opacity="0.55"/>
  <path d="M1140,570 Q1140,520 1090,520" stroke="#D4AF37" stroke-width="1.2" fill="none" opacity="0.55"/>
  <line x1="1140" y1="570" x2="1112" y2="570" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="1140" y1="570" x2="1140" y2="542" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Lotus icon -->
  <g transform="translate(600,148) scale(0.72)">
    <ellipse cx="0" cy="0" rx="14" ry="34" fill="#D4AF37" opacity="0.9"/>
    <ellipse cx="0" cy="0" rx="14" ry="34" fill="#D4AF37" opacity="0.75" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="14" ry="34" fill="#D4AF37" opacity="0.75" transform="rotate(120)"/>
    <ellipse cx="0" cy="0" rx="10" ry="24" fill="#C9A227" opacity="0.6" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="10" ry="24" fill="#C9A227" opacity="0.6" transform="rotate(90)"/>
    <ellipse cx="0" cy="0" rx="10" ry="24" fill="#C9A227" opacity="0.6" transform="rotate(150)"/>
    <circle cx="0" cy="0" r="12" fill="#D4AF37"/>
    <circle cx="0" cy="0" r="7"  fill="#F5DFA0"/>
  </g>

  <!-- "Together with their families" label -->
  <text x="600" y="230" font-family="Georgia, serif" font-size="22" fill="#D4AF37" opacity="0.75"
        text-anchor="middle" letter-spacing="7">TOGETHER WITH THEIR FAMILIES</text>

  <!-- Divider line -->
  <line x1="460" y1="248" x2="740" y2="248" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Names -->
  <text x="600" y="345" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="300"
        fill="#FDFBF7" text-anchor="middle" letter-spacing="2">Rohith &amp; Deekshitha</text>

  <!-- Ornament divider -->
  <line x1="360" y1="378" x2="540" y2="378" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.5"/>
  <circle cx="600" cy="378" r="4" fill="#D4AF37" opacity="0.7"/>
  <line x1="660" y1="378" x2="840" y2="378" stroke="#D4AF37" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Date -->
  <text x="600" y="430" font-family="Arial, sans-serif" font-size="26" fill="#D4AF37"
        text-anchor="middle" letter-spacing="5">THURSDAY · 25TH JUNE 2026</text>

  <!-- Nakshatra -->
  <text x="600" y="468" font-family="Georgia, serif" font-size="20" fill="#FDFBF7" opacity="0.55"
        text-anchor="middle" font-style="italic">Swathi Nakshatram · Karkataka Lagnam</text>

  <!-- Venue -->
  <text x="600" y="520" font-family="Arial, sans-serif" font-size="20" fill="#FDFBF7" opacity="0.45"
        text-anchor="middle" letter-spacing="2">Vinayaka Function Hall · Hanumakonda</text>
</svg>
